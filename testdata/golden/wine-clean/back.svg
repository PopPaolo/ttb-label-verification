<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <rect width="1000" height="1000" fill="#f6f1e3"/>
  <rect x="30" y="30" width="940" height="940" fill="none" stroke="#2a2118" stroke-width="2"/>

  <text x="500" y="140" font-family="Georgia, serif" font-size="32" fill="#2a2118" text-anchor="middle" letter-spacing="3">STONE&#39;S THROW VINEYARDS</text>

  <text x="500" y="230" font-family="Georgia, serif" font-size="23" fill="#2a2118" text-anchor="middle">Grown on the rocky benchland east of St. Helena, this</text>
  <text x="500" y="266" font-family="Georgia, serif" font-size="23" fill="#2a2118" text-anchor="middle">Cabernet Sauvignon spends twenty months in French oak.</text>
  <text x="500" y="302" font-family="Georgia, serif" font-size="23" fill="#2a2118" text-anchor="middle">Best enjoyed alongside good company.</text>

  <text x="500" y="420" font-family="Georgia, serif" font-size="25" fill="#2a2118" text-anchor="middle">BOTTLED BY STONE&#39;S THROW VINEYARDS,</text>
  <text x="500" y="458" font-family="Georgia, serif" font-size="25" fill="#2a2118" text-anchor="middle">ST. HELENA, CA</text>

  <text x="500" y="540" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#2a2118" text-anchor="middle">CONTAINS SULFITES</text>

  <rect x="70" y="640" width="860" height="250" fill="none" stroke="#2a2118" stroke-width="2"/>
  <text x="95" y="690" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#2a2118">
    <tspan x="95" dy="0"><tspan font-weight="bold">GOVERNMENT WARNING:</tspan> (1) According to the Surgeon</tspan>
    <tspan x="95" dy="34">General, women should not drink alcoholic beverages</tspan>
    <tspan x="95" dy="34">during pregnancy because of the risk of birth defects.</tspan>
    <tspan x="95" dy="34">(2) Consumption of alcoholic beverages impairs your</tspan>
    <tspan x="95" dy="34">ability to drive a car or operate machinery, and may</tspan>
    <tspan x="95" dy="34">cause health problems.</tspan>
  </text>
</svg>
